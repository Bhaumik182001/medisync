version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: medisync-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rootadmin
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    
  postgres-core:
    image: postgres:15-alpine
    container_name: medisync-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: medisync_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    
  redis-core:
    image: redis:7-alpine
    container_name: medisync-redis
    ports:
    - "6379:6379"
    restart: unless-stopped 
    
  rabbitmq:
    image: rabbitmq:3-management
    container_name: medisync-rabbitmq
    ports:
      - "5672:5672"   # The port our Spring Boot app uses to send messages
      - "15672:15672" # The port for the web-based Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
     
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: medisync-zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

volumes:
  mongodb_data:
  postgres_data: