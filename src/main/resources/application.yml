spring:
  application:
    name: medisync-identity 
  data: 
    mongodb:
      uri: mongodb://rootadmin:rootpassword@localhost:27017/medisync_identity?authSource=admin         
      auto-index-creation: true

server:
  port: 8081    

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
      cors:
        allowed-origins: "https://medisync-frontend-vert.vercel.app"
        allowed-methods: "GET,OPTIONS"

